# ★ 이 파일은 예시입니다. 실제 배포 시 Sealed Secrets, Vault, External Secrets Operator 등을 사용하세요.
# base64 인코딩: echo -n "값" | base64
apiVersion: v1
kind: Secret
metadata:
  name: rbi-secret
  namespace: rbi
type: Opaque
data:
  jwt-secret: Q0hBTkdFX01FX1JBTkRPTV8yNTZCSVRfU0VDUkVU   # CHANGE_ME_RANDOM_256BIT_SECRET
  bootstrap-password: Y2hhbmdlbWU=                          # changeme
  neko-password: dXNlcnBhc3M=                               # userpass
  neko-admin-password: YWRtaW5wYXNz                         # adminpass
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rbi-config
  namespace: rbi
data:
  NEKO_WEBRTC_NAT1TO1: "127.0.0.1"   # ★ 실제 외부 IP 로 교체
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rbi-data-pvc
  namespace: rbi
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rbi-policy-pvc
  namespace: rbi
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 100Mi
