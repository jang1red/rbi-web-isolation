# RBI Web Isolation — 전체 스택
# 사용법:
#   cp .env.example .env   # 환경변수 수정
#   docker compose up --build
#
# 접속: http://localhost:8080  (게이트웨이 → 인증 → 격리 워크스페이스)

services:

  # ── 1. RBCloud Browser 이미지 빌더 ─────────────────────────
  # 오케스트레이터가 로그인 시 이 이미지로 "사용자 전용 컨테이너"를 동적 생성합니다.
  # 이 서비스 자체는 이미지 빌드 + 네트워크/볼륨 보장용으로 1회 기동됩니다.
  rbcloud:
    build: ./rbcloud-browser
    image: rbi-web-isolation-rbcloud   # 오케스트레이터가 참조하는 이미지명 고정
    restart: unless-stopped
    shm_size: "2gb"
    environment:
      # neko 자체 로그인 화면 완전 제거 (게이트웨이 인증으로 보호). NEKO_PASSWORD 제거 필수.
      NEKO_MEMBER_PROVIDER: noauth
      NEKO_MEMBER_NOAUTH: "true"
      NEKO_WEBRTC_NAT1TO1: ${RBCLOUD_WEBRTC_NAT1TO1:-127.0.0.1}
      NEKO_WEBRTC_UDPMUX: ${RBCLOUD_WEBRTC_UDPMUX:-52000}
      NEKO_WEBRTC_TCPMUX: 0
      NEKO_CHROMIUM_FLAGS: >-
        --remote-debugging-port=9222
        --remote-debugging-address=0.0.0.0
        --no-first-run
        --disable-default-apps
        --disable-session-crashed-bubble
    volumes:
      - policy_data:/etc/chromium/policies/managed:ro
    ports:
      - "${RBCLOUD_WEBRTC_UDPMUX:-52000}:52000/udp"
    expose:
      - "8080"
      - "9222"
    networks:
      - rbi-net
    cap_add:
      - SYS_ADMIN

  # ── 2. 게이트웨이 (Node.js: 인증·정책·감사·오케스트레이터) ──
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      - rbcloud
    env_file: .env
    environment:
      NODE_ENV: production
      RBCLOUD_URL: http://rbcloud:8080
      CDP_HOST: rbcloud
      CDP_PORT: 9222
      DATA_DIR: /app/data
      DB_PATH: /app/data/rbi.db
      POLICY_DIR: /app/data/policies
      # ── 세션 오케스트레이터 ──
      ORCHESTRATOR_ENABLED: "true"
      RBCLOUD_IMAGE: rbi-web-isolation-rbcloud
      RBI_NETWORK: rbi-web-isolation_rbi-net
      RBI_POLICY_VOLUME: rbi-web-isolation_policy_data
      RBI_BASE_UDP_PORT: "52001"
      RBI_MAX_SESSIONS: ${RBI_MAX_SESSIONS:-50}
      # 세션 화면 해상도@프레임 — 저사양 서버는 낮춰서 인코딩 CPU 부하 절감 (기본 720p@25)
      RBI_DESKTOP_SCREEN: ${RBI_DESKTOP_SCREEN:-1280x720@25}
    volumes:
      - gateway_data:/app/data
      - policy_data:/app/data/policies
      # 프론트엔드는 이미지에 빌드 포함됨 (별도 마운트 불필요)
      # ★ Docker 데몬 소켓 — 게이트웨이가 사용자별 컨테이너를 생성/삭제
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
      # 세션별 WebRTC UDP 포트 풀 (52001~52050) — 동적 컨테이너가 직접 노출
      # (Docker가 각 세션 컨테이너에 호스트 포트를 매핑하므로 게이트웨이엔 불필요하지만
      #  방화벽 문서화를 위해 범위를 명시)
    networks:
      - rbi-net

volumes:
  gateway_data:
  policy_data:

networks:
  rbi-net:
    driver: bridge
    name: rbi-web-isolation_rbi-net
