  <text x="8" y="92" font-family="Arial Black, Arial, Helvetica, sans-serif"
        font-size="104" font-weight="900" fill="#4A9EFF" letter-spacing="-6">rb</text>
  <!-- 육각형 -->
  <polygon points="138,18 156,8 174,18 174,40 156,50 138,40" fill="#4A9EFF"/>
  <rect x="148" y="20" width="16" height="16" rx="2" fill="#1a1f2e"/>
  <!-- 'CLOUD' 흰색 -->
  <text x="150" y="88" font-family="Arial Black, Arial, Helvetica, sans-serif"
        font-size="58" font-weight="900" fill="#ffffff" letter-spacing="1">CLOUD</text>
