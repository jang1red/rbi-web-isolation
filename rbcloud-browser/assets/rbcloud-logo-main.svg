<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 120" width="380" height="120">
  <!-- ===== RB Cloud 로고 ===== -->
  <!-- 'rb' 파란 소문자 (굵은 산세리프) -->
  <text x="8" y="92" font-family="Arial Black, Arial, Helvetica, sans-serif"
        font-size="104" font-weight="900" fill="#1B4DB8" letter-spacing="-6">rb</text>

  <!-- 육각형 (b 오른쪽 위) — RB Cloud 심볼 -->
  <polygon points="138,18 156,8 174,18 174,40 156,50 138,40" fill="#1B4DB8"/>
  <!-- 육각형 안 흰색 사각형 -->
  <rect x="148" y="20" width="16" height="16" rx="2" fill="#ffffff"/>

  <!-- 'CLOUD' 진한 네이비 굵은체 -->
  <text x="150" y="88" font-family="Arial Black, Arial, Helvetica, sans-serif"
        font-size="58" font-weight="900" fill="#2B2F5E" letter-spacing="1">CLOUD</text>
</svg>
